  <!-- زر العودة للأعلى -->
  <button class="scroll-arrow" id="toTop" aria-label="Go to top">
    <svg viewBox="0 0 24 24" width="24" height="24">
      <path d="M12 8 L8 12 L16 12 Z" fill="white"/>
    </svg>
  </button>
<script>

        // جافاسكربت لإظهار الزر وإخفاؤه والتحكم في الضغط
    const btn = document.getElementById('toTop');

    // إظهار الزر بعد النزول 300px
    window.addEventListener('scroll', function() {
      if (window.scrollY > 300) {
        btn.classList.add('show');
      } else {
        btn.classList.remove('show');
      }
    });

    // عند الضغط، العودة للأعلى واختفاء الزر
    btn.addEventListener('click', function() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
      btn.classList.remove('show');
    });
</script>

</body>
